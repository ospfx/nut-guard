name: Build OpenWrt Packages (SDK)

on:
  workflow_dispatch:
    inputs:
      target:
        description: "frontend | backend | full"
        required: true
        default: full
        type: choice
        options: [frontend, backend, full]
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-distutils rsync unzip zlib1g-dev file wget

      - name: Download OpenWrt SDK
        run: |
          # 这里换成你目标架构对应的 SDK URL（必须与路由器架构一致）
          SDK_URL="https://downloads.openwrt.org/releases/24.10.0/targets/ath79/generic/openwrt-sdk-24.10.0-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          wget -O sdk.tar.zst "$SDK_URL"
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* openwrt

      - name: Prepare feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install luci-base
          ./scripts/feeds install libuci-lua
          ./scripts/feeds install lua-runtime

      - name: Inject packages
        run: |
          cp -a nut-guard openwrt/package/
          cp -a luci-app-nut-guard openwrt/package/

      - name: Build selected packages
        run: |
          cd openwrt
          make defconfig
          TARGET="${{ github.event.inputs.target || 'full' }}"
          if [ "$TARGET" = "frontend" ]; then
            make package/luci-app-nut-guard/compile V=s -j"$(nproc)"
          elif [ "$TARGET" = "backend" ]; then
            make package/nut-guard/compile V=s -j"$(nproc)"
          else
            make package/nut-guard/compile V=s -j"$(nproc)"
            make package/luci-app-nut-guard/compile V=s -j"$(nproc)"
          fi

      - name: Collect ipk
        run: |
          mkdir -p dist
          find openwrt/bin/packages -type f -name "*nut-guard*.ipk" -exec cp -v {} dist/ \;
          ls -lh dist

      - uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ github.run_id }}
          path: dist/*.ipk
