name: Build OpenWrt/ImmortalWrt IPK

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Target board (OpenWrt target, e.g. x86, ramips, rockchip)"
        required: true
        default: "x86"
      subtarget:
        description: "Subtarget (e.g. 64, 24kc, armv8)"
        required: true
        default: "64"
      arch:
        description: "Package architecture (e.g. x86_64, mipsel_24kc, aarch64_cortex-a53)"
        required: true
        default: "x86_64"
      openwrt_tag:
        description: "SDK release tag (e.g. v24.10.0, v23.05.5)"
        required: true
        default: "v24.10.0"

jobs:
  build-ipk:
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout current repo (nut-guard source)
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
            file wget curl ca-certificates

      - name: Download OpenWrt SDK
        env:
          TARGET: ${{ inputs.target }}
          SUBTARGET: ${{ inputs.subtarget }}
          TAG: ${{ inputs.openwrt_tag }}
        run: |
          set -eux
          SDK_FILE="openwrt-sdk-${TAG}-${TARGET}-${SUBTARGET}_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          SDK_URL="https://downloads.openwrt.org/releases/${TAG#v}/targets/${TARGET}/${SUBTARGET}/${SDK_FILE}"
          echo "SDK_URL=$SDK_URL"
          wget -q --show-progress "$SDK_URL" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          SDK_DIR="$(find . -maxdepth 1 -type d -name 'openwrt-sdk-*' | head -n1)"
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV

      - name: Prepare feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package source into SDK feed
        env:
          ARCH: ${{ inputs.arch }}
        run: |
          set -eux
          # 假设你的仓库根目录就是一个可被 OpenWrt 识别的 package（含 Makefile）
          # 如果你仓库里是 package/nut-guard 与 luci-app-nut-guard，请改 cp 路径
          mkdir -p "${SDK_DIR}/package/nut-guard-custom"
          rsync -a --delete ./ "${SDK_DIR}/package/nut-guard-custom/"

      - name: Configure .config
        working-directory: ${{ env.SDK_DIR }}
        env:
          ARCH: ${{ inputs.arch }}
        run: |
          set -eux
          cat >> .config <<'EOF'
          CONFIG_ALL_NONSHARED=n
          CONFIG_ALL_KMODS=n
          CONFIG_AUTOREMOVE=y
          CONFIG_PACKAGE_nut-guard-custom=y
          EOF
          make defconfig

      - name: Build package(s)
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          make package/nut-guard-custom/compile V=s -j"$(nproc)"

      - name: Collect IPK artifacts
        working-directory: ${{ env.SDK_DIR }}
        run: |
          set -eux
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          find bin/packages -type f -name "*.ipk" -exec cp -v {} "${GITHUB_WORKSPACE}/dist/" \;
          ls -lah "${GITHUB_WORKSPACE}/dist"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ipk-${{ inputs.target }}-${{ inputs.subtarget }}-${{ inputs.arch }}
          path: dist/*.ipk
          if-no-files-found: error
