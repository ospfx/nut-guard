name: CI – Lint & Check OpenWrt/Lua

# Triggered on every push/PR touching OpenWrt sources or workflow files so
# issues are caught quickly without requiring a full SDK download.
on:
  push:
    paths:
      - 'openwrt/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'openwrt/**'
      - '.github/workflows/**'
  workflow_dispatch:

# Cancel redundant runs for the same ref (e.g. rapid pushes on a branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-lua:
    name: Lua syntax & shell script check
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Lua (luac for syntax-only parse)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lua5.1

      - name: Lua syntax check (luac -p)
        run: |
          set -euo pipefail
          # luac -p performs a parse-only syntax check without executing the file
          # or resolving require() calls – perfect for CI pre-flight.
          # Lua 5.1+ skips a leading shebang line automatically.
          FAIL=0
          while IFS= read -r -d '' f; do
            echo "luac -p: $f"
            if ! luac5.1 -p "$f"; then
              echo "  ✗ syntax error in $f"
              FAIL=1
            fi
          done < <(find openwrt -type f \( -name "*.lua" -o -name "nutguard" \) -print0)
          exit "${FAIL}"

      - name: Shell script syntax check (sh -n)
        run: |
          set -euo pipefail
          # sh -n parses each script without executing it.
          FAIL=0
          while IFS= read -r -d '' f; do
            echo "sh -n: $f"
            if ! sh -n "$f"; then
              echo "  ✗ syntax error in $f"
              FAIL=1
            fi
          done < <(find openwrt -type f \( -name "*.init" -o -name "*.sh" \) -print0)
          exit "${FAIL}"

  check-openwrt-package:
    name: OpenWrt package structure check
    runs-on: ubuntu-22.04
    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify nut-guard package structure
        run: |
          set -euxo pipefail
          # Ensure all files required by the nut-guard Makefile are present.
          test -f openwrt/nut-guard/Makefile
          test -f openwrt/nut-guard/files/usr/libexec/rpcd/nutguard
          test -f openwrt/nut-guard/files/nut-guard.init
          test -f openwrt/nut-guard/files/nut-guard.conf

      - name: Verify luci-app-nut-guard package structure
        run: |
          set -euxo pipefail
          # Ensure all files required by the luci-app-nut-guard Makefile are present.
          test -f openwrt/luci-app-nut-guard/Makefile
          test -f openwrt/luci-app-nut-guard/htdocs/luci-static/resources/view/nut-guard/overview.js
          test -f openwrt/luci-app-nut-guard/root/usr/share/luci/menu.d/luci-app-nut-guard.json
          test -f openwrt/luci-app-nut-guard/root/usr/share/rpcd/acl.d/luci-app-nut-guard.json
