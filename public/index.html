<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UPS 状态</title>
    <link rel="icon" type="image/x-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='none'/%3E%3Cpath d='M35 30 L65 30 L65 55 L75 55 L75 45 L25 45 L25 55 L35 55 Z' fill='%233b82f6'/%3E%3Cpath d='M40 60 L60 60 L55 80 L45 80 Z' fill='%233b82f6'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="wrap">
      <!-- 全局警告区域 -->
      <div id="globalAlert" class="global-alert hidden">
        <div class="alert-content">
          <span id="alertIcon" class="alert-icon"></span>
          <span id="alertMessage" class="alert-message"></span>
        </div>
      </div>
      
      <header class="header">
        <div>
          <h1>UPS 状态</h1>
          <div id="subtitle" class="muted"></div>
          <div class="device-info">
            <span id="deviceModel" class="muted">设备型号：-</span>
            <span id="deviceMfr" class="muted">制造商：-</span>
          </div>
        </div>
        <div class="actions">
          <button id="refreshBtn" class="btn">立即刷新</button>
        </div>
      </header>

      <section class="card">
        <div class="row">
          <div class="field">
            <label for="ipInput">IP / Host</label>
            <input id="ipInput" class="input" placeholder="10.0.0.9" />
          </div>
          <div class="field">
            <label for="upsInput">UPS 名称</label>
            <input id="upsInput" class="input" placeholder="myups" />
          </div>
          <div class="field">
            <label for="refreshInput">刷新（秒）</label>
            <input id="refreshInput" class="input" inputmode="numeric" placeholder="5" />
          </div>
          <div class="field end">
            <label>&nbsp;</label>
            <button id="saveBtn" class="btn primary">保存配置</button>
          </div>
        </div>
        <div id="configHint" class="muted small"></div>
      </section>

      <section class="grid">
        <div class="card metric">
          <div class="k">状态</div>
          <div id="mStatus" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">电量</div>
          <div id="mCharge" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">预计可用</div>
          <div id="mRuntime" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">负载</div>
          <div id="mLoad" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">输出电压</div>
          <div id="mVoltage" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">真实功率</div>
          <div id="mRealPower" class="v">-</div>
        </div>

        <div class="card metric">
          <div class="k">UPS类型</div>
          <div id="mType" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">额定功率</div>
          <div id="mNominalPower" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">蜂鸣器状态</div>
          <div id="mBeeper" class="v">-</div>
        </div>
        <div class="card metric">
          <div class="k">电池类型</div>
          <div id="mBatteryType" class="v">-</div>
        </div>
      </section>

      <section class="card">
        <div class="row between">
          <div id="lastLine" class="muted"></div>
          <div id="netLine" class="muted"></div>
        </div>
        <div id="errorBox" class="error hidden"></div>
        <div class="tableWrap">
          <table class="kv" id="kvTable">
            <thead>
              <tr>
                <th>参数</th>
                <th>值</th>
              </tr>
            </thead>
            <tbody id="kvBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
